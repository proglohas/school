<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>二元搜尋挑戰賽 - 猜數字遊戲</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; }
        .input-group { margin: 20px 0; }
        input { padding: 10px; width: 60px; font-size: 18px; border: 2px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; }
        .guess-btn { background-color: #3498db; color: white; }
        .guess-btn:hover { background-color: #2980b9; }
        .reset-btn { background-color: #e67e22; color: white; margin-top: 10px; }
        .reset-btn:hover { background-color: #d35400; }
        
        #message { margin: 15px 0; font-weight: bold; min-height: 1.2em; color: #e74c3c; }
        
        .history-section { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .history-list { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #f9f9f9; font-family: monospace; }
        .too-high { color: #e74c3c; }
        .too-low { color: #f1c40f; }
        .correct { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>猜數字挑戰 (1-1000)</h1>
    <p>試著用最少次數找到答案！</p>
    
    <div class="input-group">
        <input type="number" id="guessInput" placeholder="??">
        <button class="guess-btn" onclick="checkGuess()">猜測</button>
    </div>

    <div id="message"></div>

    <div class="history-section">
        <strong>猜測紀錄 (Ans + Res):</strong>
        <ul id="historyList" class="history-list">
            </ul>
    </div>

    <button class="reset-btn" onclick="initGame()">重新出題</button>
</div>

<script>
    let targetNumber;
    let guessCount = 0;

    // 初始化遊戲
    function initGame() {
        targetNumber = Math.floor(Math.random() * 1000) + 1;
        guessCount = 0;
        document.getElementById('message').innerText = "遊戲開始！範圍 1 ~ 1000";
        document.getElementById('message').style.color = "#2c3e50";
        document.getElementById('historyList').innerHTML = "";
        document.getElementById('guessInput').value = "";
        //console.log("提示（僅供老師測試）：" + targetNumber);
    }

    function checkGuess() {
        const input = document.getElementById('guessInput');
        const guess = parseInt(input.value);
        const messageEl = document.getElementById('message');
        const historyList = document.getElementById('historyList');

        // 檢查輸入是否合法
        if (isNaN(guess) || guess < 1 || guess > 1000) {
            alert("請輸入 1 到 1000 之間的數字");
            return;
        }

        guessCount++;
        let result = "";
        let className = "";

        if (guess === targetNumber) {
            result = "🎉 正確！";
            className = "correct";
            messageEl.innerText = `恭喜！你猜對了！共花了 ${guessCount} 次。`;
            messageEl.style.color = "#27ae60";
        } else if (guess > targetNumber) {
            result = "↓ 太大了";
            className = "too-high";
            messageEl.innerText = "太大了，往小一點找！";
            messageEl.style.color = "#e74c3c";
        } else {
            result = "↑ 太小了";
            className = "too-low";
            messageEl.innerText = "太小了，往大一點找！";
            messageEl.style.color = "#f1c40f";
        }

        // 新增到歷史紀錄
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `<span>第 ${guessCount} 次猜：${guess}</span> <span class="${className}">${result}</span>`;
        historyList.prepend(li); // 新紀錄放在最上面

        input.value = "";
        input.focus();
    }

    // 按下 Enter 鍵也能觸發猜測
    document.getElementById('guessInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkGuess();
        }
    });

    // 頁面載入時執行初始化
    initGame();
</script>

</body>
</html>
